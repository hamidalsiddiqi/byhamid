<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stacking Cards Scrolling Effect</title>
    <style>
        body {
            font-family: Avenir, sans-serif;
            background-color: #0e100f;
            color: #fffce1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 5rem;
        }

        p {
            max-width: 70ch;
            font-size: 1.4rem;
            text-align: center;
            line-height: 1.3;
        }

        .section {
            padding: 10rem 0;
        }

        .cards-section {
            position: relative;
            display: grid;
            gap: 3rem;
            grid-template-columns: 200px auto;
        }

        .cards {
            display: grid;
            margin-top: 3.5rem;

            >* {
                grid-area: 1 / 1 / 2 / 2;
            }
        }

        .card {
            width: 300px;
            height: 250px;
            background-color: red;
            border-radius: 8px;
            border: 2px solid red;
        }

        .to-stay-card {
            background-color: red;
            border-radius: 8px;
            width: auto;
            height: 400px;
        }
    </style>
</head>

<body>
    <section class="section">
        <h1>Stacking cards problem</h1>
    </section>

    <section class="section">
        <div class="cards-section">
            <div class="to-stay-card">Something to stay</div>

            <div class='cards'>
                <div class="card">First card</div>
                <div class="card">Second card</div>
                <div class="card">Third card</div>
                <div class="card">Forth card</div>
            </div>
        </div>
    </section>

    <section class="section">
        <h1>Stacking cards problem</h1>
    </section>
</body>
<script src="https://jsdelivr.net"></script>
<script>gsap.registerPlugin(ScrollTrigger);

    // constants
    let allowScroll = true; // sometimes we want to ignore scroll-related stuff, like when an Observer-based section is transitioning.
    let scrollTimeout = gsap.delayedCall(1, () => (allowScroll = true)).pause(); // controls how long we should wait after an Observer-based animation is initiated before we allow another scroll-related action
    const time = 0.5; // animation duration
    let animating = false; // state

    // Progressive enhancement
    gsap.set(".card", {
        y: (index) => 20 * index,
        transformOrigin: "center top"
    });

    //--------------------------------//
    // The timeline
    //--------------------------------//
    const tl = gsap.timeline({
        paused: true
    });

    tl.add("card2");
    tl.to(".card:nth-child(1)", {
        scale: 0.85,
        duration: time,
        backgroundColor: "#3498db"
    });
    tl.from(
        ".card:nth-child(2)",
        {
            y: () => window.innerHeight,
            duration: time
        },
        "<"
    );

    tl.add("card3");
    tl.to(".card:nth-child(2)", {
        scale: 0.9,
        duration: time,
        backgroundColor: "#3498db"
    });
    tl.from(
        ".card:nth-child(3)",
        {
            y: () => window.innerHeight,
            duration: time
        },
        "<"
    );

    tl.add("card4");
    tl.to(".card:nth-child(3)", {
        scale: 0.95,
        duration: time,
        backgroundColor: "#3498db"
    });
    tl.from(
        ".card:nth-child(4)",
        {
            y: () => window.innerHeight,
            duration: time
        },
        "<"
    );
    tl.add("card5");
    // END The timeline --------------//

    function tweenToLabel(direction, isScrollingDown) {
        if (
            (!tl.nextLabel() && isScrollingDown) ||
            (!tl.previousLabel() && !isScrollingDown)
        ) {
            cardsObserver.disable(); // resume native scroll
            return;
        }
        if (!animating && direction) {
            // Check if we're already animating
            animating = true;
            tl.tweenTo(direction, { onComplete: () => (animating = false) });
        }
    }

    //--------------------------------//
    // Observer plugin
    //--------------------------------//
    const cardsObserver = Observer.create({
        // type: "wheel,touch,pointer",
        wheelSpeed: -1,
        onDown: (self) => tweenToLabel(tl.previousLabel(), false),
        onUp: (self) => tweenToLabel(tl.nextLabel(), true),
        tolerance: 10,
        preventDefault: true,
        onEnable(self) {
            allowScroll = false;
            scrollTimeout.restart(true);
            // when enabling, we should save the scroll position and freeze it. This fixes momentum-scroll on Macs, for example.
            let savedScroll = self.scrollY();
            self._restoreScroll = () => self.scrollY(savedScroll); // if the native scroll repositions, force it back to where it should be
            document.addEventListener("scroll", self._restoreScroll, {
                passive: false
            });
        },
        onDisable: (self) =>
            document.removeEventListener("scroll", self._restoreScroll)
    });

    cardsObserver.disable(); // Disable one page load
    // END Observer plugin --------------//

    //--------------------------------//
    // ScrollTrigger that disables the scroll and has the Observer plugin take over
    //--------------------------------//
    ScrollTrigger.create({
        id: "STOP-SCROLL",
        trigger: ".cards-section",
        pin: true,
        start: "top 20%",
        markers: true,
        end: "+=100",
        onEnter: (self) => {
            if (cardsObserver.isEnabled) return;
            cardsObserver.enable(); // STOP native scrolling
        },
        onEnterBack: (self) => {
            if (cardsObserver.isEnabled) return;
            cardsObserver.enable(); // STOP native scrolling
        }
    });</script>

</html>
